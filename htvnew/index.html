					<style>
  /* Seções controladas */
  .esconder {
    display: none;
  }

  .bloqueio-direto {
    display: block;
  }

  /* Cronômetro */
  .cronometro {
    font-size: 50px;
    font-weight: bold;
    text-align: center;
    color: #fff;
  }
</style>

<script type="text/javascript">
document.addEventListener("DOMContentLoaded", function () {

  /* CONFIGURAÇÃO */
  var SECONDS_TO_DISPLAY = 2367;
  var CLASS_TO_DISPLAY = ".esconder";

  /* Tempo inicial (30 minutos) */
  var countdownTime1 = 30 * 60;
  var countdownTime2 = 30 * 60;
  var countdownTime3 = 30 * 60;
  var countdownTime4 = 30 * 60;

  var attempts = 0;
  var elsHiddenList = [];
  var elsDisplayed = false;
  var elsHidden = document.querySelectorAll(CLASS_TO_DISPLAY);
  var alreadyDisplayedKey = "alreadyElsDisplayed_" + SECONDS_TO_DISPLAY;
  var alreadyElsDisplayed = localStorage.getItem(alreadyDisplayedKey);

  /* Captura dos elementos escondidos */
  setTimeout(function () {
    elsHiddenList = Array.prototype.slice.call(elsHidden);
  }, 0);

  /* 🔐 CONTROLE ABSOLUTO DE VISIBILIDADE */
  function applyVisibilityState(showHidden) {

    /* Mostra / Esconde .esconder */
    elsHiddenList.forEach(function (el) {
      el.style.display = showHidden ? "block" : "none";
    });

    /* Mostra / Esconde .bloqueio-direto */
    document.querySelectorAll(".bloqueio-direto").forEach(function (el) {
      el.style.display = showHidden ? "none" : "block";
    });
  }

  /* Mostra conteúdo liberado */
  function showHiddenElements() {
    if (elsDisplayed) return;

    elsDisplayed = true;
    applyVisibilityState(true);
    localStorage.setItem(alreadyDisplayedKey, "true");

    startCountdown1();
    startCountdown2();
    startCountdown3();
    startCountdown4();
  }

  /* Integração com o player */
  function startWatchVídeoProgress() {
    if (typeof smartplayer === "undefined" || !(smartplayer.instances && smartplayer.instances.length)) {
      if (attempts >= 10) return;
      attempts++;
      return setTimeout(startWatchVídeoProgress, 1000);
    }

    smartplayer.instances[0].on("timeupdate", function () {
      if (elsDisplayed || smartplayer.instances[0].smartAutoPlay) return;
      if (smartplayer.instances[0].Vídeo.currentTime < SECONDS_TO_DISPLAY) return;
      showHiddenElements();
    });
  }

  /* Estado inicial */
  if (alreadyElsDisplayed === "true") {
    applyVisibilityState(true);
    setTimeout(showHiddenElements, 100);
  } else {
    applyVisibilityState(false);
    startWatchVídeoProgress();
  }

  /* Formatação de tempo */
  function formatTime(seconds) {
    var minutes = Math.floor(seconds / 60);
    var secs = seconds % 60;
    return (minutes < 10 ? "0" + minutes : minutes) + ":" + (secs < 10 ? "0" + secs : secs);
  }

  /* ⏱️ CRONÔMETROS */
  function startCountdown(id, timeRef) {
    var el = document.getElementById(id);
    if (!el) return;

    var interval = setInterval(function () {
      timeRef.value--;
      el.textContent = formatTime(timeRef.value);

      if (timeRef.value <= 0) {
        clearInterval(interval);
        el.textContent = "Tempo Esgotado!";
      }
    }, 1000);
  }

  startCountdown1 = function () {
    startCountdown("cronometro1", { value: countdownTime1 });
  };
  startCountdown2 = function () {
    startCountdown("cronometro2", { value: countdownTime2 });
  };
  startCountdown3 = function () {
    startCountdown("cronometro3", { value: countdownTime3 });
  };
  startCountdown4 = function () {
    startCountdown("cronometro4", { value: countdownTime4 });
  };

});
</script>
