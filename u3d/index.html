            margin:0;

        .container{

        }

        p{
            margin-bottom:28px;
        }

        strong{
            color:#000;

        }

        .highlight{
            background:#fafafa;
            border-left:4px solid #1dbf4f;
            padding:25px;
            border-radius:8px;
            margin-bottom:30px;
        }

        .decision-container{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:20px;
            width:100%;
            max-width:500px;
            margin:10px auto 35px auto;
        }

        .btn-yes{
            display:block;
            width:100%;
            background:#25D366;
            color:#fff;
            text-align:center;
            padding:22px 20px;
            font-size:24px;
            font-weight:800;
            text-transform:uppercase;
            text-decoration:none;
            border-radius:10px;
            box-shadow:0 4px 15px rgba(37,211,102,0.4);
            transition:0.2s ease;
            animation:pulse-green 1.5s infinite;
        }

        .btn-yes:hover{
            transform:translateY(-2px);
            background:#1ebc59;
        }

        .btn-no{
            color:#6c757d;
            font-size:15px;
            text-decoration:underline;
            text-align:center;
            transition:0.2s ease;
        }

        .btn-no:hover{
            color:#495057;
        }

        img{
            max-width:100%;
            display:block;
            margin:0 auto 25px auto;
            border-radius:10px;
        }

        @keyframes pulse-green{
            0%{
                transform:scale(1);
                box-shadow:0 0 0 0 rgba(37,211,102,0.7);
            }

            50%{
                transform:scale(1.04);
                box-shadow:0 0 0 12px rgba(37,211,102,0);
            }

            100%{
                transform:scale(1);
                box-shadow:0 0 0 0 rgba(37,211,102,0);
            }
        }

        @media(max-width:600px){

            body{
                padding:10px;
                font-size:17px;
            }

            .container{
                padding:22px;
            }

            h1{

            }

            .btn-yes{
